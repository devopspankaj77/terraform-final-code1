trigger:
  branches:
    include:
      - main
      - develop

variables:
  terraformVersion: '1.5.0'
  azureServiceConnection: 'azure-conn'
  backendResourceGroup: 'rg-tf-backend'
  # backendStorageAccount: 'tfstate12345'
  backendStorageAccount: 'tfstatepankaj123'
  backendContainer: 'tfstate'
  backendKey: 'infra.tfstate'

stages:

# =========================
# 🔷 STAGE 1: SAST (SonarQube)
# =========================
- stage: SAST
  displayName: "Code Analysis (SAST)"
  jobs:
    - job: SonarQubeScan
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self

        - task: SonarQubePrepare@5
          inputs:
            SonarQube: 'sonarqube-conn'
            scannerMode: 'CLI'
            configMode: 'manual'
            cliProjectKey: 'my-project'
            cliSources: '.'

        - task: SonarQubeAnalyze@5

        - task: SonarQubePublish@5
          inputs:
            pollingTimeoutSec: '300'

# =========================
# 🔷 STAGE 2: DLP SCAN
# =========================
- stage: DLP
  dependsOn: SAST
  jobs:
    - job: DLPScan
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self

        - script: |
            pip install trufflehog
            trufflehog filesystem --regex --entropy=False . || true
          displayName: "DLP Scan (TruffleHog)"

# =========================
# 🔷 STAGE 3: IaC SCAN + VALIDATE
# =========================
- stage: IaC
  dependsOn: DLP
  jobs:
    - job: TerraformValidate
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self

        # Install Terraform
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: $(terraformVersion)

        # Init with backend
        - task: TerraformTaskV4@4
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: $(azureServiceConnection)
            backendAzureRmResourceGroupName: $(backendResourceGroup)
            backendAzureRmStorageAccountName: $(backendStorageAccount)
            backendAzureRmContainerName: $(backendContainer)
            backendAzureRmKey: $(backendKey)

        # Validate
        - task: TerraformTaskV4@4
          inputs:
            provider: 'azurerm'
            command: 'validate'

        # IaC Scan (Checkov)
        - script: |
            pip install checkov
            checkov -d .
          displayName: "Checkov Scan"

# =========================
# 🔷 STAGE 4: PLAN
# =========================
- stage: Plan
  dependsOn: IaC
  jobs:
    - job: TerraformPlan
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self

        - task: TerraformInstaller@1
          inputs:
            terraformVersion: $(terraformVersion)

        - task: TerraformTaskV4@4
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: $(azureServiceConnection)
            backendAzureRmResourceGroupName: $(backendResourceGroup)
            backendAzureRmStorageAccountName: $(backendStorageAccount)
            backendAzureRmContainerName: $(backendContainer)
            backendAzureRmKey: $(backendKey)

        - task: TerraformTaskV4@4
          inputs:
            provider: 'azurerm'
            command: 'plan'
            environmentServiceNameAzureRM: $(azureServiceConnection)

# =========================
# 🔷 STAGE 5: DEPLOY DEV
# =========================
- stage: Deploy_Dev
  dependsOn: Plan
  jobs:
    - deployment: DevDeploy
      environment: "dev"
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              - task: TerraformInstaller@1
                inputs:
                  terraformVersion: $(terraformVersion)

              - task: TerraformTaskV4@4
                inputs:
                  provider: 'azurerm'
                  command: 'apply'
                  environmentServiceNameAzureRM: $(azureServiceConnection)
                  args: '-auto-approve'

# =========================
# 🔷 STAGE 6: DAST
# =========================
- stage: DAST
  dependsOn: Deploy_Dev
  jobs:
    - job: DASTScan
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - script: |
            docker run -t owasp/zap2docker-stable zap-baseline.py \
            -t http://your-dev-app-url
          displayName: "OWASP ZAP Scan"

# =========================
# 🔷 STAGE 7: DEPLOY PROD
# =========================
- stage: Deploy_Prod
  dependsOn: DAST
  condition: succeeded()
  jobs:
    - deployment: ProdDeploy
      environment: "production"
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              - task: TerraformInstaller@1
                inputs:
                  terraformVersion: $(terraformVersion)

              - task: TerraformTaskV4@4
                inputs:
                  provider: 'azurerm'
                  command: 'apply'
                  environmentServiceNameAzureRM: $(azureServiceConnection)
                  args: '-auto-approve'